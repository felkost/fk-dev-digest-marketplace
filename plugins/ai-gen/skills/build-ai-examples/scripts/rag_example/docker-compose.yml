# Minimal store for the RAG example: Postgres with pgvector.
#   docker compose up -d
#   python ingest.py ./docs
#   python agent.py "your question"
#
# The embedding server is deliberately NOT here: the default is a local Ollama
# on the host (see .env.example). Add it as a service when you want the whole
# example reproducible with one `docker compose up`.

services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: rag
      POSTGRES_PASSWORD: rag # dev-only; use a secret manager anywhere real
      POSTGRES_DB: rag
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      # Compose reporting "started" is not the same as Postgres accepting
      # connections; ingest.py will race it without this.
      test: ["CMD-SHELL", "pg_isready -U rag -d rag"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  pgdata:
