name: validate

# Harness/content-quality gate — schema validation, the marketplace's own linter, the official
# plugin validator, and the eval static gate. Deliberately a SEPARATE workflow from `site-build`
# (site-build.yml, the website build check) and `pages` (pages.yml, the Pages deploy) so this
# shows as its own check in the GitHub UI, never conflated with the website the catalog feeds.
# See docs/SITE-SPEC.md § CI separation.

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: validate-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 22

      - name: Install root dependencies
        run: npm ci

      - name: Prettier check
        run: npx prettier --check .

      - name: Markdownlint
        run: npx markdownlint-cli2 "**/*.md" "#**/node_modules" "#**/dist"

      - name: Marketplace linter (schema + cross-checks + forbidden markers + Cyrillic)
        run: node scripts/validate-marketplace.mjs

      - name: Install Claude Code CLI
        id: install_cli
        # Best-effort: the official validator is a stronger check than the linter above, but this
        # step depends on an external package staying installable on the runner. If it ever
        # becomes flaky, this step is intentionally non-blocking (continue-on-error below) and the
        # validate step below is skipped, leaving the marketplace linter above as the gate. When
        # the CLI *does* install, the validate step is blocking (see CONTRIBUTING.md).
        continue-on-error: true
        run: npm install -g @anthropic-ai/claude-code

      - name: claude plugin validate (marketplace + every plugin)
        if: steps.install_cli.outcome == 'success'
        # Blocking on purpose. The wrapper runs `claude plugin validate --strict` over the
        # marketplace and every plugin, then drops exactly one known-accepted warning (a CLAUDE.md
        # at a plugin root, and only where that file actually exists — see CONTRIBUTING.md).
        # A bare --strict loop is permanently red for the four plugins that carry one, which is
        # why this step used to be continue-on-error — and that masked real findings. Tolerance
        # for a flaky CLI install stays where it belongs: on the install step above, which this
        # step is gated on.
        run: node scripts/validate-plugins.mjs

      - name: Install eval dependencies
        working-directory: evals
        # --legacy-peer-deps: @anthropic-ai/claude-agent-sdk and openai both pull in zod at
        # compatible-but-not-identical versions; npm's strict peer resolution flags that as a
        # conflict even though the resolved version satisfies both ranges. This flag only skips
        # the strict abort — it does not change what's declared or force an actually broken tree.
        run: npm install --no-audit --no-fund --legacy-peer-deps

      - name: Eval static gate (no model, no network)
        working-directory: evals
        run: npm run eval:quality
