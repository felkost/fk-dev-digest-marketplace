name: harvest-clones

# Harvests GitHub's repository clone traffic into the stats backend's clone_stats table, because
# the GitHub Traffic API itself only retains a rolling 14-day window (see
# server/src/harvestClones.ts and server/README.md § Clone harvesting). Runs daily; safe to
# re-run — it upserts by day, refining the last couple of days as GitHub finalizes them rather
# than duplicating history.
#
# Requires two repo secrets (Settings → Secrets and variables → Actions):
#   * STATS_DATABASE_URL — the same Neon/PostgreSQL connection string used by the
#     fk-dev-digest-stats Render service.
#   * TRAFFIC_PAT — a Personal Access Token that can read this repo's clone traffic. The GitHub
#     Traffic API is NOT accessible to the default GITHUB_TOKEN (it returns 403 "Resource not
#     accessible by integration", and traffic access cannot be granted via `permissions:`). Use a
#     fine-grained PAT scoped to this repo with the "Administration: Read-only" permission, or a
#     classic PAT with the `repo` scope, created by an account with push access.
#
# The token line falls back to GITHUB_TOKEN when TRAFFIC_PAT is unset, so the workflow stays valid
# before the PAT is added — that run will 403 until TRAFFIC_PAT exists.

on:
  schedule:
    - cron: "17 3 * * *" # once daily, off-peak UTC
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: harvest-clones
  cancel-in-progress: false

jobs:
  harvest:
    name: harvest
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 22

      - name: Install server dependencies
        working-directory: server
        run: npm ci

      - name: Harvest clone traffic into clone_stats
        working-directory: server
        env:
          # Prefer the traffic-capable PAT; fall back to the default token (which 403s on the
          # Traffic API) only so the workflow stays valid before the PAT secret is added.
          GITHUB_TOKEN: ${{ secrets.TRAFFIC_PAT || secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          DATABASE_URL: ${{ secrets.STATS_DATABASE_URL }}
        run: npm run harvest:clones
